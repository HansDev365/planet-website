<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planet Website</title>
    <link rel="icon" type="image/png" href="images/favicomatic/favicon-32x32.png" sizes="32x32">
    <link rel="icon" type="image/png" href="images/favicomatic/favicon-16x16.png" sizes="16x16">
    <!-- Self-hosted font preload -->
    <link rel="preload" href="fonts/Author-Variable.woff2" as="font" type="font/woff2" crossorigin>
    <!--Stylesheets-->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/styles-navbar.css">
    <link rel="stylesheet" href="css/author.css">
</head>

<body>
    <header class="header">
        <div class="container header__inner">
            <a class="logo" href="#home">EARTH</a>

            <nav class="nav" aria-label="Main navigation">
                <a class="nav_link" href="#home">Home</a>
                <a class="nav_link" href="#about">About</a>
                <a class="nav_link" href="#facts">Facts</a>
                <a class="nav_link" href="#gallery">Gallery</a>
            </nav>
        </div>
    </header>
    <main>
        <section id="home" class="section hero">
            <div class="container hero__grid">
                <div class="hero__content">
                    <p class="eyebrow">Third Planet from the Sun</p>
                    <h1>Earth, Our Blue Home</h1>
                    <p class="section-text">
                        Earth is a living world of deep oceans, drifting clouds, and diverse ecosystems.
                        It is the only known planet that supports life.
                    </p>
                    <div class="hero__actions">
                        <a class="btn btn--primary" href="#about">Explore Earth</a>
                        <a class="btn btn--ghost" href="#facts">Quick Facts</a>
                    </div>
                </div>

                <figure class="hero__media">
                    <img src="https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?auto=format&fit=crop&w=1200&q=80"
                        alt="Planet Earth seen from space with bright blue oceans and cloud patterns">
                </figure>
            </div>
        </section>


</body>

</html>
